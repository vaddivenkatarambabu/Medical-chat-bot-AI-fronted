<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <meta
      name="description"
      content="MediCore is an AI medical assistant for instant, empathetic health guidance and triage support."
    />
    <meta name="theme-color" content="#0d1117" />

    <meta property="og:title" content="MediCore - AI Medical Assistant" />
    <meta
      property="og:description"
      content="AI medical assistant for instant, empathetic health guidance and triage support."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />

    <title>MediCore - AI Medical Assistant</title>

    <style>
      :root {
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #f8fafc;
        background: #0d1117;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 30% 20%, rgba(20, 184, 166, 0.2), transparent 32%),
          radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.18), transparent 30%),
          #0d1117;
      }

      main {
        width: min(100%, 560px);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 18px auto 0;
        max-width: 48ch;
        color: #cbd5e1;
        font-size: 1rem;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        margin-top: 28px;
        padding: 0 18px;
        border-radius: 8px;
        color: #08111f;
        background: #67e8f9;
        font-weight: 700;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid #f8fafc;
        outline-offset: 4px;
      }
    </style>
  </head>

  <body>
    <main>
      <h1>MediCore</h1>
      <p>
        AI medical assistant for instant, empathetic health guidance and triage
        support.
      </p>
      <a href="/chat">Open chat</a>
    </main>
  </body>
</html>
